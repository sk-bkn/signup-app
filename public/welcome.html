<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
    }

    .card {
      background: #1f2937;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 500px;
      margin: 20px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      color: #f9fafb;
      margin-bottom: 12px;
    }

    p {
      color: #9ca3af;
      font-size: 16px;
      margin-bottom: 24px;
    }

    a {
      color: #818cf8;
      text-decoration: none;
      font-size: 14px;
    }
    a:hover { text-decoration: underline; }

    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: #1f2937;
      border: 2px solid #818cf8;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .home-btn:hover { background: #374151; }
    .home-btn svg { fill: #818cf8; }

    .projects-btn {
      position: fixed;
      top: 20px;
      left: 72px;
      padding: 8px 16px;
      background: #1f2937;
      color: #818cf8;
      border: 2px solid #818cf8;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      height: 40px;
    }
    .projects-btn:hover { background: #374151; }

    .menu-container {
      position: fixed;
      top: 20px;
      right: 20px;
    }

    .menu-btn {
      width: 40px;
      height: 40px;
      background: #1f2937;
      border: 2px solid #818cf8;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .menu-btn:hover { background: #374151; }

    .menu-btn span {
      display: block;
      width: 18px;
      height: 2px;
      background: #818cf8;
      position: relative;
    }
    .menu-btn span::before,
    .menu-btn span::after {
      content: "";
      display: block;
      width: 18px;
      height: 2px;
      background: #818cf8;
      position: absolute;
    }
    .menu-btn span::before { top: -6px; }
    .menu-btn span::after { top: 6px; }

    .dropdown {
      display: none;
      position: absolute;
      top: 48px;
      right: 0;
      background: #1f2937;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      min-width: 180px;
      overflow: hidden;
    }
    .dropdown.open { display: block; }

    .dropdown button {
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      color: #d1d5db;
      cursor: pointer;
      transition: background 0.15s;
    }
    .dropdown button:hover { background: #374151; }
  </style>
</head>
<body>
  <button class="home-btn" onclick="location.reload()">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
  </button>
  <button class="projects-btn" onclick="window.location.href='/projects.html'">Projects</button>
  <div class="menu-container">
    <button class="menu-btn" id="menuBtn"><span></span></button>
    <div class="dropdown" id="dropdown">
      <button onclick="window.location.href='/my-account.html'">My account</button>
      <button onclick="if(confirm('Are you sure you want to log out?')){localStorage.removeItem('userEmail');window.location.href='/'}">Log out</button>
    </div>
  </div>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const dropdown = document.getElementById("dropdown");

    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("open");
    });

    document.addEventListener("click", () => {
      dropdown.classList.remove("open");
    });
  </script>
  <div class="card">
    <h1>Welcome</h1>
    <p>You have successfully logged in.</p>
  </div>
</body>
</html>
