<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: #111827;
      padding: 80px 20px 40px;
    }

    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: #1f2937;
      border: 2px solid #818cf8;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 50;
    }
    .home-btn:hover { background: #374151; }
    .home-btn svg { fill: #818cf8; }

    h1 {
      text-align: center;
      font-size: 24px;
      color: #f9fafb;
      margin-bottom: 24px;
    }

    .table-container {
      max-width: 1100px;
      margin: 0 auto 24px;
      background: #1f2937;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #4f46e5;
      color: #fff;
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
      color: #d1d5db;
      border-bottom: 1px solid #374151;
    }

    tbody tr { cursor: pointer; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #374151; }
    tbody tr.selected td { background: #3730a3; }

    .empty-message {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 15px;
    }

    .btn-container {
      text-align: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    .create-btn {
      padding: 14px 28px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .create-btn:hover { background: #4338ca; }
    .create-btn:active { background: #3730a3; }

    /* Create modal */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #1f2937;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 480px;
      margin: 20px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: 20px;
      color: #f9fafb;
      margin-bottom: 24px;
      text-align: center;
    }

    .modal label, .side-panel label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #d1d5db;
      margin-bottom: 6px;
    }

    .modal select, .side-panel select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #4b5563;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      background: #374151;
      color: #f9fafb;
      cursor: pointer;
    }
    .modal select:focus, .side-panel select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .modal input, .side-panel input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #4b5563;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      background: #374151;
      color: #f9fafb;
    }
    .modal input::placeholder, .side-panel input::placeholder { color: #9ca3af; }
    .modal input:focus, .side-panel input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .cancel-btn {
      background: #1f2937;
      color: #d1d5db;
      border: 1px solid #4b5563;
    }
    .cancel-btn:hover { background: #374151; }

    .submit-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
    }
    .submit-btn:hover { background: #4338ca; }
    .submit-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* Side panel */
    .side-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100%;
      background: #1f2937;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.4);
      z-index: 90;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 32px 24px;
    }
    .side-panel.open { right: 0; }

    .side-panel-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 80;
    }
    .side-panel-overlay.open { display: block; }

    .side-panel h2 {
      font-size: 20px;
      color: #f9fafb;
      margin-bottom: 24px;
      text-align: center;
    }

    .close-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      font-size: 20px;
      color: #9ca3af;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-panel:hover { background: #374151; color: #f9fafb; }

    .panel-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #4338ca; }
    .save-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .delete-btn {
      width: 100%;
      padding: 12px;
      background: #1f2937;
      color: #f87171;
      border: 2px solid #f87171;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .delete-btn:hover { background: #374151; }

    /* View toggle buttons */
    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .view-toggle button {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .view-toggle button.active {
      background: #4f46e5;
      color: #fff;
      border: 2px solid #4f46e5;
    }
    .view-toggle button:not(.active) {
      background: #1f2937;
      color: #818cf8;
      border: 2px solid #818cf8;
    }
    .view-toggle button:not(.active):hover {
      background: #374151;
    }

    /* Kanban board */
    .kanban-board {
      display: none;
      max-width: 1200px;
      margin: 0 auto 24px;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .kanban-board.active {
      display: flex;
    }

    .kanban-column {
      flex: 0 0 180px;
      min-height: 300px;
      background: #1f2937;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      border: 2px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .kanban-column.drag-over {
      border-color: #4f46e5;
      background: #312e81;
    }

    .kanban-column-header {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      border-radius: 8px 8px 0 0;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .kanban-column[data-status="Not Started"] .kanban-column-header { background: #6b7280; }
    .kanban-column[data-status="On Track"] .kanban-column-header { background: #16a34a; }
    .kanban-column[data-status="Off Track"] .kanban-column-header { background: #dc2626; }
    .kanban-column[data-status="At Risk"] .kanban-column-header { background: #f59e0b; }
    .kanban-column[data-status="Done"] .kanban-column-header { background: #2563eb; }
    .kanban-column[data-status="Deprioritized"] .kanban-column-header { background: #9ca3af; }

    .kanban-column-body {
      flex: 1;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .kanban-tile {
      background: #374151;
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: grab;
      transition: box-shadow 0.2s;
      user-select: none;
    }
    .kanban-tile:active { cursor: grabbing; }
    .kanban-tile:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

    .kanban-tile-name {
      font-size: 13px;
      font-weight: 600;
      color: #f9fafb;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .kanban-tile-meta {
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <button class="home-btn" onclick="window.location.href='/welcome.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
  </button>

  <h1>Projects</h1>

  <div class="view-toggle">
    <button id="listViewBtn" class="active">List View</button>
    <button id="panelViewBtn">Panel View</button>
  </div>

  <div class="table-container">
    <table id="projectsTable">
      <thead>
        <tr>
          <th>Project Name</th>
          <th>Project Type</th>
          <th>Success Metric</th>
          <th>Goal Target</th>
          <th>Target Date</th>
          <th>Start Value</th>
          <th>Current Status</th>
          <th>End Value</th>
        </tr>
      </thead>
      <tbody id="projectsBody">
      </tbody>
    </table>
    <div class="empty-message" id="emptyMessage">No projects yet. Create your first one!</div>
  </div>

  <div class="kanban-board" id="kanbanView">
    <div class="kanban-column" data-status="Not Started">
      <div class="kanban-column-header">Not Started</div>
      <div class="kanban-column-body"></div>
    </div>
    <div class="kanban-column" data-status="On Track">
      <div class="kanban-column-header">On Track</div>
      <div class="kanban-column-body"></div>
    </div>
    <div class="kanban-column" data-status="Off Track">
      <div class="kanban-column-header">Off Track</div>
      <div class="kanban-column-body"></div>
    </div>
    <div class="kanban-column" data-status="At Risk">
      <div class="kanban-column-header">At Risk</div>
      <div class="kanban-column-body"></div>
    </div>
    <div class="kanban-column" data-status="Done">
      <div class="kanban-column-header">Done</div>
      <div class="kanban-column-body"></div>
    </div>
    <div class="kanban-column" data-status="Deprioritized">
      <div class="kanban-column-header">Deprioritized</div>
      <div class="kanban-column-body"></div>
    </div>
  </div>

  <div class="btn-container">
    <button class="create-btn" id="createBtn">Create new project</button>
  </div>

  <!-- Create modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Create New Project</h2>
      <form id="projectForm">
        <label for="projectName">Project Name</label>
        <input type="text" id="projectName" placeholder="Enter project name" required>

        <label for="projectType">Project Type</label>
        <input type="text" id="projectType" placeholder="Enter project type" required>

        <label for="successMetric">Success Metric</label>
        <input type="text" id="successMetric" placeholder="Enter success metric" required>

        <label for="goalTarget">Goal Target</label>
        <input type="text" id="goalTarget" placeholder="Enter goal target" required>

        <label for="targetDate">Target Date</label>
        <input type="date" id="targetDate" required>

        <label for="startValue">Start Value</label>
        <input type="text" id="startValue" placeholder="Enter start value" required>

        <label for="currentValue">Current Status</label>
        <select id="currentValue">
          <option value="Not Started">Not Started</option>
          <option value="On Track">On Track</option>
          <option value="Off Track">Off Track</option>
          <option value="At Risk">At Risk</option>
          <option value="Done">Done</option>
          <option value="Deprioritized">Deprioritized</option>
        </select>

        <label for="endValue">End Value</label>
        <input type="text" id="endValue" placeholder="Enter end value" required>

        <div class="modal-actions">
          <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
          <button type="submit" class="submit-btn" id="submitBtn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit side panel -->
  <div class="side-panel-overlay" id="panelOverlay"></div>
  <div class="side-panel" id="sidePanel">
    <button class="close-panel" id="closePanel">&times;</button>
    <h2>Edit Project</h2>
    <form id="editForm">
      <input type="hidden" id="editId">

      <label for="editProjectName">Project Name</label>
      <input type="text" id="editProjectName" required>

      <label for="editProjectType">Project Type</label>
      <input type="text" id="editProjectType" required>

      <label for="editSuccessMetric">Success Metric</label>
      <input type="text" id="editSuccessMetric" required>

      <label for="editGoalTarget">Goal Target</label>
      <input type="text" id="editGoalTarget" required>

      <label for="editTargetDate">Target Date</label>
      <input type="date" id="editTargetDate" required>

      <label for="editStartValue">Start Value</label>
      <input type="text" id="editStartValue" required>

      <label for="editCurrentValue">Current Status</label>
      <select id="editCurrentValue">
        <option value="Not Started">Not Started</option>
        <option value="On Track">On Track</option>
        <option value="Off Track">Off Track</option>
        <option value="At Risk">At Risk</option>
        <option value="Done">Done</option>
        <option value="Deprioritized">Deprioritized</option>
      </select>

      <label for="editEndValue">End Value</label>
      <input type="text" id="editEndValue" required>

      <div class="panel-actions">
        <button type="submit" class="save-btn" id="saveBtn">Save</button>
        <button type="button" class="delete-btn" id="deleteBtn">Delete project</button>
      </div>
    </form>
  </div>

  <script>
    const email = localStorage.getItem("userEmail");
    if (!email) window.location.href = "/";

    const createBtn = document.getElementById("createBtn");
    const overlay = document.getElementById("overlay");
    const cancelBtn = document.getElementById("cancelBtn");
    const projectForm = document.getElementById("projectForm");
    const submitBtn = document.getElementById("submitBtn");
    const projectsBody = document.getElementById("projectsBody");
    const emptyMessage = document.getElementById("emptyMessage");
    const projectsTable = document.getElementById("projectsTable");

    const sidePanel = document.getElementById("sidePanel");
    const panelOverlay = document.getElementById("panelOverlay");
    const closePanel = document.getElementById("closePanel");
    const editForm = document.getElementById("editForm");
    const saveBtn = document.getElementById("saveBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    const listViewBtn = document.getElementById("listViewBtn");
    const panelViewBtn = document.getElementById("panelViewBtn");
    const kanbanView = document.getElementById("kanbanView");
    const tableContainer = document.querySelector(".table-container");

    let allProjects = [];
    let activeView = "list";

    // View toggle
    listViewBtn.addEventListener("click", () => {
      activeView = "list";
      listViewBtn.classList.add("active");
      panelViewBtn.classList.remove("active");
      tableContainer.style.display = "";
      kanbanView.classList.remove("active");
      renderProjects(allProjects);
    });

    panelViewBtn.addEventListener("click", () => {
      activeView = "panel";
      panelViewBtn.classList.add("active");
      listViewBtn.classList.remove("active");
      tableContainer.style.display = "none";
      kanbanView.classList.add("active");
      renderKanban(allProjects);
    });

    function renderProjects(projects) {
      allProjects = projects;
      projectsBody.innerHTML = "";
      if (projects.length === 0) {
        emptyMessage.style.display = "block";
        projectsTable.querySelector("thead").style.display = "none";
      } else {
        emptyMessage.style.display = "none";
        projectsTable.querySelector("thead").style.display = "";
        projects.forEach(p => {
          const tr = document.createElement("tr");
          tr.dataset.id = p.id;
          tr.innerHTML =
            "<td>" + escapeHtml(p.project_name) + "</td>" +
            "<td>" + escapeHtml(p.project_type) + "</td>" +
            "<td>" + escapeHtml(p.success_metric) + "</td>" +
            "<td>" + escapeHtml(p.goal_target) + "</td>" +
            "<td>" + escapeHtml(p.target_date) + "</td>" +
            "<td>" + escapeHtml(p.start_value) + "</td>" +
            "<td>" + escapeHtml(p.current_value || "") + "</td>" +
            "<td>" + escapeHtml(p.end_value) + "</td>";
          tr.addEventListener("click", () => openEditPanel(p));
          projectsBody.appendChild(tr);
        });
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadProjects() {
      const res = await fetch("/api/projects?email=" + encodeURIComponent(email));
      const projects = await res.json();
      allProjects = projects;
      renderProjects(projects);
      if (activeView === "panel") {
        renderKanban(projects);
      }
    }

    function openEditPanel(project) {
      document.getElementById("editId").value = project.id;
      document.getElementById("editProjectName").value = project.project_name;
      document.getElementById("editProjectType").value = project.project_type;
      document.getElementById("editSuccessMetric").value = project.success_metric;
      document.getElementById("editGoalTarget").value = project.goal_target;
      document.getElementById("editTargetDate").value = project.target_date;
      document.getElementById("editStartValue").value = project.start_value;
      document.getElementById("editCurrentValue").value = project.current_value || "";
      document.getElementById("editEndValue").value = project.end_value;

      sidePanel.classList.add("open");
      panelOverlay.classList.add("open");
    }

    function closeSidePanel() {
      sidePanel.classList.remove("open");
      panelOverlay.classList.remove("open");
    }

    closePanel.addEventListener("click", closeSidePanel);
    panelOverlay.addEventListener("click", closeSidePanel);

    // Kanban rendering
    function renderKanban(projects) {
      const columns = kanbanView.querySelectorAll(".kanban-column");
      columns.forEach(col => {
        const body = col.querySelector(".kanban-column-body");
        body.innerHTML = "";
      });

      projects.forEach(p => {
        const status = p.current_value || "Not Started";
        const col = kanbanView.querySelector('.kanban-column[data-status="' + status + '"]');
        if (!col) return;
        const body = col.querySelector(".kanban-column-body");

        const tile = document.createElement("div");
        tile.className = "kanban-tile";
        tile.draggable = true;
        tile.dataset.id = p.id;
        tile.innerHTML =
          '<div class="kanban-tile-name">' + escapeHtml(p.project_name) + '</div>' +
          '<div class="kanban-tile-meta">' + escapeHtml(p.project_type) + '</div>' +
          '<div class="kanban-tile-meta">' + escapeHtml(p.goal_target) + '</div>';

        tile.addEventListener("click", () => openEditPanel(p));

        tile.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", p.id);
          e.dataTransfer.effectAllowed = "move";
        });

        body.appendChild(tile);
      });
    }

    // Drag and drop on columns
    kanbanView.querySelectorAll(".kanban-column").forEach(col => {
      col.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        col.classList.add("drag-over");
      });

      col.addEventListener("dragleave", () => {
        col.classList.remove("drag-over");
      });

      col.addEventListener("drop", async (e) => {
        e.preventDefault();
        col.classList.remove("drag-over");
        const projectId = e.dataTransfer.getData("text/plain");
        const newStatus = col.dataset.status;

        const project = allProjects.find(p => String(p.id) === String(projectId));
        if (!project || project.current_value === newStatus) return;

        try {
          await fetch("/api/projects/" + projectId, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              projectName: project.project_name,
              projectType: project.project_type,
              successMetric: project.success_metric,
              goalTarget: project.goal_target,
              targetDate: project.target_date,
              startValue: project.start_value,
              currentValue: newStatus,
              endValue: project.end_value,
            }),
          });
          loadProjects();
        } catch {}
      });
    });

    editForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("editId").value;
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        const res = await fetch("/api/projects/" + id, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            projectName: document.getElementById("editProjectName").value,
            projectType: document.getElementById("editProjectType").value,
            successMetric: document.getElementById("editSuccessMetric").value,
            goalTarget: document.getElementById("editGoalTarget").value,
            targetDate: document.getElementById("editTargetDate").value,
            startValue: document.getElementById("editStartValue").value,
            currentValue: document.getElementById("editCurrentValue").value,
            endValue: document.getElementById("editEndValue").value,
          }),
        });

        if (res.ok) {
          closeSidePanel();
          loadProjects();
        }
      } catch {}

      saveBtn.disabled = false;
      saveBtn.textContent = "Save";
    });

    deleteBtn.addEventListener("click", async () => {
      if (!confirm("Are you sure you want to delete this project?")) return;

      const id = document.getElementById("editId").value;
      try {
        const res = await fetch("/api/projects/" + id, { method: "DELETE" });
        if (res.ok) {
          closeSidePanel();
          loadProjects();
        }
      } catch {}
    });

    // Create modal
    createBtn.addEventListener("click", () => {
      overlay.classList.add("open");
    });

    cancelBtn.addEventListener("click", () => {
      overlay.classList.remove("open");
      projectForm.reset();
    });

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) {
        overlay.classList.remove("open");
        projectForm.reset();
      }
    });

    projectForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";

      try {
        const res = await fetch("/api/projects", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            projectName: document.getElementById("projectName").value,
            projectType: document.getElementById("projectType").value,
            successMetric: document.getElementById("successMetric").value,
            goalTarget: document.getElementById("goalTarget").value,
            targetDate: document.getElementById("targetDate").value,
            startValue: document.getElementById("startValue").value,
            currentValue: document.getElementById("currentValue").value,
            endValue: document.getElementById("endValue").value,
          }),
        });

        if (res.ok) {
          overlay.classList.remove("open");
          projectForm.reset();
          loadProjects();
        }
      } catch {}

      submitBtn.disabled = false;
      submitBtn.textContent = "Create";
    });

    loadProjects();
  </script>
</body>
</html>
