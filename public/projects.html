<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: #f0f2f5;
      padding: 80px 20px 40px;
    }

    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: #fff;
      border: 2px solid #4f46e5;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 50;
    }
    .home-btn:hover { background: #eef2ff; }
    .home-btn svg { fill: #4f46e5; }

    h1 {
      text-align: center;
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    .table-container {
      max-width: 1100px;
      margin: 0 auto 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #4f46e5;
      color: #fff;
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #e5e7eb;
    }

    tbody tr { cursor: pointer; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #eef2ff; }
    tbody tr.selected td { background: #e0e7ff; }

    .empty-message {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 15px;
    }

    .btn-container {
      text-align: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    .create-btn {
      padding: 14px 28px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .create-btn:hover { background: #4338ca; }
    .create-btn:active { background: #3730a3; }

    /* Create modal */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 480px;
      margin: 20px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 24px;
      text-align: center;
    }

    .modal label, .side-panel label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    .modal select, .side-panel select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      background: #fff;
      cursor: pointer;
    }
    .modal select:focus, .side-panel select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .modal input, .side-panel input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .modal input:focus, .side-panel input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .cancel-btn {
      background: #fff;
      color: #333;
      border: 1px solid #d0d5dd;
    }
    .cancel-btn:hover { background: #f3f4f6; }

    .submit-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
    }
    .submit-btn:hover { background: #4338ca; }
    .submit-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* Side panel */
    .side-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.12);
      z-index: 90;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 32px 24px;
    }
    .side-panel.open { right: 0; }

    .side-panel-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 80;
    }
    .side-panel-overlay.open { display: block; }

    .side-panel h2 {
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 24px;
      text-align: center;
    }

    .close-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      font-size: 20px;
      color: #888;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-panel:hover { background: #f3f4f6; color: #333; }

    .panel-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #4338ca; }
    .save-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .delete-btn {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #dc2626;
      border: 2px solid #dc2626;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .delete-btn:hover { background: #fef2f2; }
  </style>
</head>
<body>
  <button class="home-btn" onclick="window.location.href='/welcome.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
  </button>

  <h1>Projects</h1>

  <div class="table-container">
    <table id="projectsTable">
      <thead>
        <tr>
          <th>Project Name</th>
          <th>Project Type</th>
          <th>Success Metric</th>
          <th>Goal Target</th>
          <th>Target Date</th>
          <th>Start Value</th>
          <th>Current Status</th>
          <th>End Value</th>
        </tr>
      </thead>
      <tbody id="projectsBody">
      </tbody>
    </table>
    <div class="empty-message" id="emptyMessage">No projects yet. Create your first one!</div>
  </div>

  <div class="btn-container">
    <button class="create-btn" id="createBtn">Create new project</button>
  </div>

  <!-- Create modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Create New Project</h2>
      <form id="projectForm">
        <label for="projectName">Project Name</label>
        <input type="text" id="projectName" placeholder="Enter project name" required>

        <label for="projectType">Project Type</label>
        <input type="text" id="projectType" placeholder="Enter project type" required>

        <label for="successMetric">Success Metric</label>
        <input type="text" id="successMetric" placeholder="Enter success metric" required>

        <label for="goalTarget">Goal Target</label>
        <input type="text" id="goalTarget" placeholder="Enter goal target" required>

        <label for="targetDate">Target Date</label>
        <input type="date" id="targetDate" required>

        <label for="startValue">Start Value</label>
        <input type="text" id="startValue" placeholder="Enter start value" required>

        <label for="currentValue">Current Status</label>
        <select id="currentValue">
          <option value="Not Started">Not Started</option>
          <option value="On Track">On Track</option>
          <option value="Off Track">Off Track</option>
          <option value="At Risk">At Risk</option>
          <option value="Done">Done</option>
          <option value="Deprioritized">Deprioritized</option>
        </select>

        <label for="endValue">End Value</label>
        <input type="text" id="endValue" placeholder="Enter end value" required>

        <div class="modal-actions">
          <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
          <button type="submit" class="submit-btn" id="submitBtn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit side panel -->
  <div class="side-panel-overlay" id="panelOverlay"></div>
  <div class="side-panel" id="sidePanel">
    <button class="close-panel" id="closePanel">&times;</button>
    <h2>Edit Project</h2>
    <form id="editForm">
      <input type="hidden" id="editId">

      <label for="editProjectName">Project Name</label>
      <input type="text" id="editProjectName" required>

      <label for="editProjectType">Project Type</label>
      <input type="text" id="editProjectType" required>

      <label for="editSuccessMetric">Success Metric</label>
      <input type="text" id="editSuccessMetric" required>

      <label for="editGoalTarget">Goal Target</label>
      <input type="text" id="editGoalTarget" required>

      <label for="editTargetDate">Target Date</label>
      <input type="date" id="editTargetDate" required>

      <label for="editStartValue">Start Value</label>
      <input type="text" id="editStartValue" required>

      <label for="editCurrentValue">Current Status</label>
      <select id="editCurrentValue">
        <option value="Not Started">Not Started</option>
        <option value="On Track">On Track</option>
        <option value="Off Track">Off Track</option>
        <option value="At Risk">At Risk</option>
        <option value="Done">Done</option>
        <option value="Deprioritized">Deprioritized</option>
      </select>

      <label for="editEndValue">End Value</label>
      <input type="text" id="editEndValue" required>

      <div class="panel-actions">
        <button type="submit" class="save-btn" id="saveBtn">Save</button>
        <button type="button" class="delete-btn" id="deleteBtn">Delete project</button>
      </div>
    </form>
  </div>

  <script>
    const email = localStorage.getItem("userEmail");
    if (!email) window.location.href = "/";

    const createBtn = document.getElementById("createBtn");
    const overlay = document.getElementById("overlay");
    const cancelBtn = document.getElementById("cancelBtn");
    const projectForm = document.getElementById("projectForm");
    const submitBtn = document.getElementById("submitBtn");
    const projectsBody = document.getElementById("projectsBody");
    const emptyMessage = document.getElementById("emptyMessage");
    const projectsTable = document.getElementById("projectsTable");

    const sidePanel = document.getElementById("sidePanel");
    const panelOverlay = document.getElementById("panelOverlay");
    const closePanel = document.getElementById("closePanel");
    const editForm = document.getElementById("editForm");
    const saveBtn = document.getElementById("saveBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    let allProjects = [];

    function renderProjects(projects) {
      allProjects = projects;
      projectsBody.innerHTML = "";
      if (projects.length === 0) {
        emptyMessage.style.display = "block";
        projectsTable.querySelector("thead").style.display = "none";
      } else {
        emptyMessage.style.display = "none";
        projectsTable.querySelector("thead").style.display = "";
        projects.forEach(p => {
          const tr = document.createElement("tr");
          tr.dataset.id = p.id;
          tr.innerHTML =
            "<td>" + escapeHtml(p.project_name) + "</td>" +
            "<td>" + escapeHtml(p.project_type) + "</td>" +
            "<td>" + escapeHtml(p.success_metric) + "</td>" +
            "<td>" + escapeHtml(p.goal_target) + "</td>" +
            "<td>" + escapeHtml(p.target_date) + "</td>" +
            "<td>" + escapeHtml(p.start_value) + "</td>" +
            "<td>" + escapeHtml(p.current_value || "") + "</td>" +
            "<td>" + escapeHtml(p.end_value) + "</td>";
          tr.addEventListener("click", () => openEditPanel(p));
          projectsBody.appendChild(tr);
        });
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadProjects() {
      const res = await fetch("/api/projects?email=" + encodeURIComponent(email));
      const projects = await res.json();
      renderProjects(projects);
    }

    function openEditPanel(project) {
      document.getElementById("editId").value = project.id;
      document.getElementById("editProjectName").value = project.project_name;
      document.getElementById("editProjectType").value = project.project_type;
      document.getElementById("editSuccessMetric").value = project.success_metric;
      document.getElementById("editGoalTarget").value = project.goal_target;
      document.getElementById("editTargetDate").value = project.target_date;
      document.getElementById("editStartValue").value = project.start_value;
      document.getElementById("editCurrentValue").value = project.current_value || "";
      document.getElementById("editEndValue").value = project.end_value;

      sidePanel.classList.add("open");
      panelOverlay.classList.add("open");
    }

    function closeSidePanel() {
      sidePanel.classList.remove("open");
      panelOverlay.classList.remove("open");
    }

    closePanel.addEventListener("click", closeSidePanel);
    panelOverlay.addEventListener("click", closeSidePanel);

    editForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("editId").value;
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        const res = await fetch("/api/projects/" + id, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            projectName: document.getElementById("editProjectName").value,
            projectType: document.getElementById("editProjectType").value,
            successMetric: document.getElementById("editSuccessMetric").value,
            goalTarget: document.getElementById("editGoalTarget").value,
            targetDate: document.getElementById("editTargetDate").value,
            startValue: document.getElementById("editStartValue").value,
            currentValue: document.getElementById("editCurrentValue").value,
            endValue: document.getElementById("editEndValue").value,
          }),
        });

        if (res.ok) {
          closeSidePanel();
          loadProjects();
        }
      } catch {}

      saveBtn.disabled = false;
      saveBtn.textContent = "Save";
    });

    deleteBtn.addEventListener("click", async () => {
      if (!confirm("Are you sure you want to delete this project?")) return;

      const id = document.getElementById("editId").value;
      try {
        const res = await fetch("/api/projects/" + id, { method: "DELETE" });
        if (res.ok) {
          closeSidePanel();
          loadProjects();
        }
      } catch {}
    });

    // Create modal
    createBtn.addEventListener("click", () => {
      overlay.classList.add("open");
    });

    cancelBtn.addEventListener("click", () => {
      overlay.classList.remove("open");
      projectForm.reset();
    });

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) {
        overlay.classList.remove("open");
        projectForm.reset();
      }
    });

    projectForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";

      try {
        const res = await fetch("/api/projects", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            projectName: document.getElementById("projectName").value,
            projectType: document.getElementById("projectType").value,
            successMetric: document.getElementById("successMetric").value,
            goalTarget: document.getElementById("goalTarget").value,
            targetDate: document.getElementById("targetDate").value,
            startValue: document.getElementById("startValue").value,
            currentValue: document.getElementById("currentValue").value,
            endValue: document.getElementById("endValue").value,
          }),
        });

        if (res.ok) {
          overlay.classList.remove("open");
          projectForm.reset();
          loadProjects();
        }
      } catch {}

      submitBtn.disabled = false;
      submitBtn.textContent = "Create";
    });

    loadProjects();
  </script>
</body>
</html>
