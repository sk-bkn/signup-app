<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }

    .card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
      margin: 20px;
    }

    h1 {
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 32px;
      text-align: center;
    }

    .field {
      margin-bottom: 20px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .field-value {
      font-size: 16px;
      color: #1a1a1a;
      padding: 12px 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    .change-password-btn {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
    }
    .change-password-btn:hover { background: #4338ca; }
    .change-password-btn:active { background: #3730a3; }

    .password-form {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }
    .password-form.open { display: block; }

    .password-form label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    .password-form input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .password-form input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .save-btn {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #4338ca; }
    .save-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .message {
      text-align: center;
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .message.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .message.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: #fff;
      border: 2px solid #4f46e5;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .home-btn:hover { background: #eef2ff; }
    .home-btn svg { fill: #4f46e5; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #4f46e5;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <button class="home-btn" onclick="window.location.href='/welcome.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
  </button>
  <div class="card">
    <h1>My Account</h1>

    <div class="field">
      <div class="field-label">Email</div>
      <div class="field-value" id="emailDisplay"></div>
    </div>

    <div class="field">
      <div class="field-label">Password</div>
      <div class="field-value">••••••••</div>
    </div>

    <button class="change-password-btn" id="changePasswordBtn">Change password</button>

    <div class="password-form" id="passwordForm">
      <label for="currentPassword">Current password</label>
      <input type="password" id="currentPassword" placeholder="Enter current password" required>

      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6">

      <button class="save-btn" id="saveBtn">Save new password</button>
      <div id="message" class="message"></div>
    </div>

    <a href="/welcome.html" class="back-link">Back to home</a>
  </div>

  <script>
    const email = localStorage.getItem("userEmail");
    if (!email) {
      window.location.href = "/";
    }
    document.getElementById("emailDisplay").textContent = email;

    const changePasswordBtn = document.getElementById("changePasswordBtn");
    const passwordForm = document.getElementById("passwordForm");
    const saveBtn = document.getElementById("saveBtn");
    const messageEl = document.getElementById("message");

    changePasswordBtn.addEventListener("click", () => {
      passwordForm.classList.toggle("open");
      changePasswordBtn.style.display = passwordForm.classList.contains("open") ? "none" : "block";
    });

    saveBtn.addEventListener("click", async () => {
      const currentPassword = document.getElementById("currentPassword").value;
      const newPassword = document.getElementById("newPassword").value;

      if (!currentPassword || !newPassword) {
        messageEl.textContent = "Please fill in both fields.";
        messageEl.className = "message error";
        return;
      }

      messageEl.className = "message";
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        const res = await fetch("/api/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, currentPassword, newPassword }),
        });

        const data = await res.json();

        if (res.ok) {
          messageEl.textContent = data.message;
          messageEl.className = "message success";
          document.getElementById("currentPassword").value = "";
          document.getElementById("newPassword").value = "";
        } else {
          messageEl.textContent = data.error;
          messageEl.className = "message error";
        }
      } catch {
        messageEl.textContent = "Network error. Please try again.";
        messageEl.className = "message error";
      }

      saveBtn.disabled = false;
      saveBtn.textContent = "Save new password";
    });
  </script>
</body>
</html>
